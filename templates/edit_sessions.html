{% extends "base.html" %}
{% block content %}

<h2>Edit Session</h2>

<div class="card p-4">
    <form method="POST">

        <div class="mb-3">
            <label>Patient</label>
            <select name="patient_id" class="form-control">
                {% for p in patients %}
                <option value="{{ p.id }}" {% if p.id == session.patient_id %}selected{% endif %}>
                    {{ p.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Clinician</label>
            <select name="clinician_id" class="form-control">
                {% for c in clinicians %}
                <option value="{{ c.id }}" {% if c.id == session.clinician_id %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="session_date" class="form-control" value="{{ session.session_date }}" required>
        </div>

        <div class="mb-3">
            <label>Notes</label>
            <textarea name="notes" class="form-control">{{ session.notes }}</textarea>
        </div>

        <button class="btn btn-primary">Update</button>

    </form>
</div>

{% endblock %}
