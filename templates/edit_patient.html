{% extends "base.html" %}
{% block content %}

<h2>Edit Patient</h2>

<div class="card p-4">
    <form method="POST" action="/edit_patient/{{ patient.id }}">

        <div class="mb-3">
            <label>Name</label>
            <input class="form-control" name="name" value="{{ patient.name }}" required>
        </div>

        <div class="mb-3">
            <label>Gender</label>
            <input class="form-control" name="gender" value="{{ patient.gender }}" required>
        </div>

        <div class="mb-3">
            <label>DOB</label>
            <input class="form-control" name="dob" value="{{ patient.dob }}" required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input class="form-control" name="address" value="{{ patient.address }}" required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input class="form-control" name="phone" value="{{ patient.phone }}" required>
        </div>

        <button class="btn btn-primary">Update</button>
        <a href="/patients" class="btn btn-secondary">Cancel</a>

    </form>
</div>

{% endblock %}
