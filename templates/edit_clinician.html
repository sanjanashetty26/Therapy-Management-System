{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Edit Clinician</h2>

<div class="card p-4 shadow-sm">

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Clinician Name</label>
            <input class="form-control" name="name" value="{{ clinician.name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Specialization</label>
            <input class="form-control" name="specialization" value="{{ clinician.specialization }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" value="{{ clinician.phone }}" required>
        </div>

        <button class="btn btn-primary">Update</button>
        <a href="/clinicians" class="btn btn-secondary">Cancel</a>

    </form>

</div>

{% endblock %}
